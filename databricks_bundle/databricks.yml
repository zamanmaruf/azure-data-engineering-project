bundle:
  name: spotify_dab

include:
  - resources/*.yml

variables:
  catalog:
    description: Catalog to use for deployment
  schema:
    description: Schema to use for deployment

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605258757054.14.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: spotify_cata
      schema: silver

  prod:
    mode: production
    workspace:
      host: https://adb-7405605258757054.14.azuredatabricks.net
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: spotify_cata
      schema: gold
    permissions:
      - user_name: mdmarufuzzaman.cs_gmail.com#ext#@mdmarufuzzamancsgmail.onmicrosoft.com
        level: CAN_MANAGE
