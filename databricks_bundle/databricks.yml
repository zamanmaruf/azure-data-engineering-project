bundle:
  name: spotify_dab
  databricks_cli_version: ">= 0.283.1"

include:
  - resources/*.yml

workspace:
  host: https://adb-7405605258757054.14.azuredatabricks.net

variables:
  catalog:
    description: Catalog to use for deployment
  schema:
    description: Schema to use for deployment

targets:
  dev:
    mode: development
    workspace:
root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
              artifact_path: ${workspace.root_path}/artifacts
      state_path: ${workspace.root_path}/state
    variables:
      catalog: spotify_cata
      schema: silver
  prod:
    mode: production
    workspace:
root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
      artifact_path: ${workspace.root_path}/artifacts
      state_path: ${workspace.root_path}/state
    variables:
      catalog: spotify_cata
      schema: gold
