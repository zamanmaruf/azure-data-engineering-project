bundle:
  name: spotify_dab

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name for the target environment
    default: spotify_dev

  schema:
    description: Schema name for the target environment
    default: default

targets:
  dev:
    mode: production
    default: true
    variables:
      catalog: spotify_dev
      schema: default
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    variables:
      catalog: spotify_prod
      schema: default
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
