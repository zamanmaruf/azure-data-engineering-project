bundle:
  name: spotify_dab
  databricks_cli_version: ">= 0.283.1"

include:
  - resources/*.yml

workspace:
  root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
  file_path: ${workspace.root_path}/files
  artifact_path: ${workspace.root_path}/artifacts
  state_path: ${workspace.root_path}/state

variables:
  catalog:
    description: Catalog to use for deployment
  schema:
    description: Schema to use for deployment

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405605258757054.14.azuredatabricks.net
      root_path: /Workspace/Shared/.bundle/${bundle.name}/dev
    variables:
      catalog: spotify_cata
      schema: silver

  prod:
    mode: production
    workspace:
      host: https://adb-7405605258757054.14.azuredatabricks.net
      root_path: /Workspace/Shared/.bundle/${bundle.name}/prod
    variables:
      catalog: spotify_cata
      schema: gold
