# The main pipeline for spotify_dab

resources:
  pipelines:
    spotify_dab_etl:
      name: spotify_dab_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true

      # Libraries define what code the pipeline runs.
      # Point this at a real notebook or Python file in your bundle.
      libraries:
        - notebook:
            path: ../src/silver/silver_Dimensions.ipynb

      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
