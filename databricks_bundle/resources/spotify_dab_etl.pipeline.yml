# Spotify DAB - Delta Live Tables Pipeline
# Deploys the DLT pipeline to the target Databricks workspace

resources:
  pipelines:
    spotify_dab_etl:
      name: spotify_dab_etl
      catalog: ${var.catalog}
      target: ${var.schema}
      serverless: true
      libraries:
        - notebook:
            path: ../src/silver/silver_Dimensions.ipynb
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
      permissions:
        - level: CAN_VIEW
          group_name: users
