name: Databricks CI/CD with Asset Bundles

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Configure Databricks CLI
        run: |
          databricks configure --token <<EOF
          https://adb-7405605258757054.14.azuredatabricks.net
          ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      - name: Install Databricks Asset Bundle CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate Bundle
        working-directory: .
        run: databricks bundle validate --profile DEFAULT

      - name: Deploy to Dev
        working-directory: .
        run: databricks bundle deploy --target dev --profile DEFAULT
        env:
          DATABRICKS_HOST: https://adb-7405605258757054.14.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: prod
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks Asset Bundle CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy to Prod
        working-directory: .
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: https://adb-7405605258757054.14.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
