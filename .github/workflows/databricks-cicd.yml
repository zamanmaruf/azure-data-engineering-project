name: Databricks CI/CD with Asset Bundles

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: databricks-bundle-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  DATABRICKS_AUTH_TYPE: pat

jobs:
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./databricks_bundle
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.283.1

      - name: Validate dev target
        run: databricks bundle validate --target dev

      - name: Validate prod target
        if: github.event_name == 'push'
        run: databricks bundle validate --target prod

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    defaults:
      run:
        working-directory: ./databricks_bundle
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.283.1

      - name: Deploy bundle to dev
        run: databricks bundle deploy --target dev --force-lock

      - name: Deployment summary
        run: databricks bundle summary --target dev

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: prod
    defaults:
      run:
        working-directory: ./databricks_bundle
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.283.1

      - name: Deploy bundle to prod
        run: databricks bundle deploy --target prod --force-lock

      - name: Deployment summary
        run: databricks bundle summary --target prod
