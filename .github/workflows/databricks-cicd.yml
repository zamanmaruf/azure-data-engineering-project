name: Databricks CI/CD with Asset Bundles

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: databricks-bundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------ #
  # JOB 1: Validate bundle on every PR and push                         #
  # ------------------------------------------------------------------ #
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./databricks_bundle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.283.1

      - name: Validate dev bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
        run: databricks bundle validate --target dev

  # ------------------------------------------------------------------ #
  # JOB 2: Deploy to Dev  (push to main only)                          #
  # ------------------------------------------------------------------ #
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./databricks_bundle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.283.1

      - name: Deploy bundle to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
        run: databricks bundle deploy --target dev

  # ------------------------------------------------------------------ #
  # JOB 3: Deploy to Production  (push to main only, after dev passes) #
  # ------------------------------------------------------------------ #
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./databricks_bundle

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.283.1

      - name: Deploy bundle to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_AUTH_TYPE: pat
        run: databricks bundle deploy --target prod
